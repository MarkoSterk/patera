[project]
name = "patera-caching"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "cachetools>=7.0.5",
  "patera",
]

[project.optional-dependencies]
redis = [
  "redis>=5.0",
]
sqlite = [
  "aiosqlite>=0.20",
]
all = [
  "redis>=5.0",
  "aiosqlite>=0.20",
]

[tool.uv.sources]
patera = { workspace = true }

[tool.uv.build-backend]
module-name = "patera.caching"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
