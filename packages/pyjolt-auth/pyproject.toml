[project]
name = "pyjolt-auth"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "bcrypt>=5.0.0",
  "cryptography>=46.0.5",
  "pyjolt",
]

[tool.uv.sources]
pyjolt = { workspace = true }

[tool.uv.build-backend]
module-name = "pyjolt.auth"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
