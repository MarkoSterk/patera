[project]
name = "patera-database"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "patera",
  "sqlalchemy",
  "aiosqlite",
]

[tool.uv.sources]
patera = { workspace = true }

[tool.uv.build-backend]
module-name = "patera.database"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
