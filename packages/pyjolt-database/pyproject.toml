[project]
name = "pyjolt-database"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "pyjolt",
  "sqlalchemy",
  "aiosqlite",
]

[tool.uv.sources]
pyjolt = { workspace = true }

[tool.uv.build-backend]
module-name = "pyjolt.database"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
