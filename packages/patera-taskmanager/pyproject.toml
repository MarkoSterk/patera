[project]
name = "patera-taskmanager"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "apscheduler>=3.11.2",
  "patera",
]

[tool.uv.sources]
patera = { workspace = true }

[tool.uv.build-backend]
module-name = "patera.taskmanager"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
