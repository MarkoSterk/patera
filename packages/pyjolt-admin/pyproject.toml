[project]
name = "pyjolt-admin"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "pyjolt",
  "pyjolt-auth",
  "pyjolt-caching",
  "pyjolt-database",
  "pyjolt-email",
  "pyjolt-taskmanager",
  "wtforms-sqlalchemy>=0.4.2",
]

[tool.uv.sources]
pyjolt = { workspace = true }
pyjolt-auth = { workspace = true }
pyjolt-caching = { workspace = true }
pyjolt-database = { workspace = true }
pyjolt-email = { workspace = true }
pyjolt-taskmanager = { workspace = true }

[tool.uv.build-backend]
module-name = "pyjolt.admin"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
