[project]
name = "patera-frontendext"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "patera",
  "pyodide-py>=0.27.7",
  "pyscript>=0.3.3",
]

[tool.uv.sources]
patera = { workspace = true }

[tool.uv.build-backend]
module-name = "patera.frontendext"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
